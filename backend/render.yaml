services:
  - type: web
    name: luma-api
    env: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: luma-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: ENABLE_DEMO_FALLBACK
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /health

databases:
  - name: luma-db
    region: ohio
    plan: free
    databaseName: luma
    user: luma_user
